<!DOCTYPE html>
<html>

<head>
    <title>Book System Login</title>
</head>

<body>

<h2>Book Retrieval System</h2>

<input
    type="text"
    id="username"
    placeholder="Username"
>

<br><br>

<input
    type="email"
    id="email"
    placeholder="Email"
>

<br><br>

<input
    type="password"
    id="password"
    placeholder="Password"
>

<br><br>

<button onclick="register()">
    Register
</button>

<button onclick="login()">
    Login
</button>

<br><br>

<div id="message"></div>


<script>

const API_URL="http://localhost:8000";


async function register(){

    let username=
        document.getElementById("username").value;

    let email=
        document.getElementById("email").value;

    let password=
        document.getElementById("password").value;


    try{

        let response=await fetch(
            `${API_URL}/register`,
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    username:username,
                    email:email,
                    password:password

                })

            }
        );


        let data=await response.json();

        document.getElementById(
            "message"
        ).innerText=data.message;

    }

    catch(error){

        console.log(error);

        document.getElementById(
            "message"
        ).innerText="Register failed";

    }

}



async function login(){

    let username=
        document.getElementById("username").value;

    let password=
        document.getElementById("password").value;


    try{

        let response=await fetch(
            "http://localhost:8000/login",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    username:username,
                    password:password

                })
            }
        );


        let data=await response.json();

        console.log(data);


        if(!response.ok){

            document.getElementById(
                "message"
            ).innerText=data.detail;

            return;
        }


        document.getElementById(
            "message"
        ).innerText=data.message;


        localStorage.setItem(
            "user_id",
            data.user_id
        );


        window.location.href=
            "search.html";

    }

    catch(error){

        console.log(error);

        document.getElementById(
            "message"
        ).innerText=error;

    }

}

</script>

</body>

</html>

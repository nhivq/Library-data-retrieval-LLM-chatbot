<!DOCTYPE html>
<html>

<head>
    <title>Book Search</title>
</head>

<body>

<h2>Search Books</h2>

<input
    type="text"
    id="query"
    placeholder="Search..."
>

<button onclick="searchBooks()">
    Search
</button>

<br><br>

<div id="results"></div>


<script>

const API_URL="http://localhost:8000";


async function searchBooks(){

    let query=
        document.getElementById(
            "query"
        ).value;


    try{

        let response=await fetch(
            `${API_URL}/books/search?q=${query}`
        );

        let books=
            await response.json();


        let results=
            document.getElementById(
                "results"
            );

        results.innerHTML="";


        books.forEach(book=>{

            results.innerHTML+=`

            <div>

            <h3>
            ${book.title}
            </h3>

            <p>
            Rating:
            ${book.rating}
            </p>

            </div>

            <hr>

            `;

        });

    }

    catch(error){

        console.log(error);

    }

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Book Search</title>

    <style>

        .container{
            display:flex;
        }

        .filters{
            width:200px;
            padding:10px;
            border-right:1px solid black;
        }

        .content{
            padding:10px;
            margin-left:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- Filter section -->

    <div class="filters">

        <h3>Filters</h3>

        <label>Author</label>

        <br>

        <input
            type="text"
            id="author"
        >

        <br><br>

        <label>Minimum Rating</label>

        <br>

        <input
            type="number"
            id="rating"
            min="0"
            max="5"
        >

        <br><br>

        <label>Genre/Tag</label>

        <br>

        <input
            type="text"
            id="tag"
        >

    </div>


    <!-- Search section -->

    <div class="content">

        <h2>Book Search</h2>

        <input
            type="text"
            id="query"
            placeholder="Search books..."
        >

        <button onclick="searchBooks()">

            Search

        </button>

        <br><br>

        <div id="results"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
